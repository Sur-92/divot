name: Build Divot.app

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'Divot/**'
      - 'Tests/**'
      - 'project.yml'
      - 'Divot.xcodeproj/**'
      - '.github/workflows/build-app.yml'

jobs:
  # Unit tests run in parallel with the build. A failure surfaces (red X)
  # but does NOT block artifact production — this is a personal app shipped
  # by downloading the artifact, so a flaky/failed test shouldn't gate a
  # deploy. Treat it as a safety net, not a hard gate.
  test:
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Select Xcode 26.5
        run: sudo xcode-select -s /Applications/Xcode_26.5.app
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Xcode project from project.yml
        run: xcodegen generate
      - name: Run unit tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project Divot.xcodeproj \
            -scheme Divot \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

  build:
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26.5
        run: sudo xcode-select -s /Applications/Xcode_26.5.app

      - name: Toolchain info
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project from project.yml
        run: xcodegen generate

      - name: Build Divot (Release, unsigned)
        run: |
          set -o pipefail
          rm -rf out
          xcodebuild \
            -project Divot.xcodeproj \
            -target Divot \
            -configuration Release \
            CONFIGURATION_BUILD_DIR="$PWD/out" \
            CURRENT_PROJECT_VERSION="${GITHUB_RUN_NUMBER}" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Locate and package app
        run: |
          APP="out/Divot.app"
          test -d "$APP" || { echo "Divot.app not found at $APP"; find out -name '*.app' -maxdepth 5; exit 1; }
          echo "Built: $APP"
          ditto -c -k --sequesterRsrc --keepParent "$APP" Divot.zip
          ls -lh Divot.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Divot-app
          path: Divot.zip
          if-no-files-found: error
          retention-days: 7
