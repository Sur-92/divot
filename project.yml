name: Divot
options:
  bundleIdPrefix: com.roadandrock
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_STYLE: Automatic

targets:
  Divot:
    type: application
    platform: macOS
    sources:
      - path: Divot
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.roadandrock.Divot
        PRODUCT_NAME: Divot
        GENERATE_INFOPLIST_FILE: YES
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: Divot/Divot.entitlements
        DEVELOPMENT_ASSET_PATHS: "\"Divot/Preview Content\""
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.sports"
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "Divot uses your location to mark and measure shot distances on the course."
        INFOPLIST_KEY_NSLocationUsageDescription: "Divot uses your location to mark and measure shot distances on the course."
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "0.1"
        SWIFT_EMIT_LOC_STRINGS: YES
        COMBINE_HIDPI_IMAGES: YES

  # Standalone logic-test bundle — deliberately NOT hosted in the app.
  # App-hosted (TEST_HOST) runs crashed: the running Divot app already owns
  # a ModelContainer for these @Model classes, and creating a second
  # container for the same classes in one process is a known SwiftData
  # crash. Compiling the (UI-free) model sources directly into the bundle
  # gives the test process exactly one container and skips the app launch.
  DivotTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
      - path: Divot/Models
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.roadandrock.DivotTests

schemes:
  Divot:
    build:
      targets:
        Divot: all
    test:
      targets:
        - DivotTests
    run:
      config: Release
